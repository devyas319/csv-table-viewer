name: Publish Extension

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      publish_target:
        description: 'Publish target'
        required: true
        default: 'both'
        type: choice
        options:
          - both
          - vsce
          - ovsx

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Compile
        run: npm run compile

      - name: Package extension
        run: npx @vscode/vsce package -o csv-interactive-table-viewer.vsix

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: csv-interactive-table-viewer-vsix
          path: csv-interactive-table-viewer.vsix

  publish-vsce:
    needs: build
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'release' ||
      github.event.inputs.publish_target == 'both' ||
      github.event.inputs.publish_target == 'vsce'
    steps:
      - name: Download VSIX
        uses: actions/download-artifact@v4
        with:
          name: csv-interactive-table-viewer-vsix

      - name: Publish to VS Code Marketplace
        run: npx @vscode/vsce publish --packagePath csv-interactive-table-viewer.vsix
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

  publish-ovsx:
    needs: build
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'release' ||
      github.event.inputs.publish_target == 'both' ||
      github.event.inputs.publish_target == 'ovsx'
    steps:
      - name: Download VSIX
        uses: actions/download-artifact@v4
        with:
          name: csv-interactive-table-viewer-vsix

      - name: Publish to Open VSX
        run: npx ovsx publish csv-interactive-table-viewer.vsix -p ${{ secrets.OVSX_PAT }}
